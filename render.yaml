services:
  - type: web
    name: spectre-portfolio
    runtime: node
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    healthCheckPath: /api/auth/session
    envVars:
      - key: NODE_VERSION
        value: 22.13.0
      - key: NODE_ENV
        value: production
      - key: SQLITE_DB_PATH
        value: /var/data/aladdin.sqlite
    disk:
      name: spectre-sqlite-data
      mountPath: /var/data
      sizeGB: 1
  - type: cron
    name: spectre-platinum-live-scan
    runtime: node
    schedule: "*/30 * * * *"
    buildCommand: npm ci
    startCommand: curl -fsS -X POST -H "Authorization: Bearer $BACKUP_CRON_TOKEN" "$PLATINUM_SCAN_BASE_URL/api/internal/ops/platinum/scan?mode=live"
    envVars:
      - key: PLATINUM_SCAN_BASE_URL
        sync: false
      - key: BACKUP_CRON_TOKEN
        sync: false
