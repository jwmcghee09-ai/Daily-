<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SPECTRE — Portfolio Analytics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #e9e4f6;
      --card:      rgba(14,11,26,.97);
      --border:    rgba(124,77,255,.16);
      --purple:    #7c4dff;
      --purple-hi: #a855f7;
      --orange:    #ff7a30;
      --gain:      #a855f7;
      --loss:      #ff7a30;
      --text:      #f2eeff;
      --muted:     #9890b8;
      --header-h:  56px;
    }

    html { font-family: 'Space Grotesk', sans-serif; }

    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-top: calc(var(--header-h) + 16px);
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    /* ── Scrollbars ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(124,77,255,.3); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(124,77,255,.5); }

    /* ── Header ── */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: rgba(14,11,26,.97);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.4rem;
      z-index: 100;
      -webkit-app-region: drag;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    #header.mac-inset {
      padding-top: 28px;
      height: calc(var(--header-h) + 28px);
    }

    body.mac-inset {
      padding-top: calc(var(--header-h) + 28px + 16px);
    }

    .header-logo {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: .04em;
      background: linear-gradient(90deg, #7c4dff, #d946ef, #ff7a30);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      user-select: none;
      -webkit-user-select: none;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: .9rem;
      -webkit-app-region: no-drag;
    }

    #last-updated {
      font-family: 'DM Mono', monospace;
      font-size: .7rem;
      color: var(--muted);
    }

    .btn {
      font-family: 'DM Mono', monospace;
      font-size: .72rem;
      font-weight: 500;
      padding: .32rem .8rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(124,77,255,.12);
      color: var(--purple-hi);
      cursor: pointer;
      transition: background .15s, border-color .15s;
      -webkit-app-region: no-drag;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: .3rem;
    }
    .btn:hover { background: rgba(124,77,255,.22); border-color: rgba(124,77,255,.4); }

    /* ── Main layout ── */
    .page {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 1.4rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    /* ── KPI row ── */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
    }

    .kpi-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.2rem 1.4rem;
      display: flex;
      flex-direction: column;
      gap: .5rem;
      transition: border-color .2s;
    }

    .kpi-label {
      font-family: 'DM Mono', monospace;
      font-size: .56rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .kpi-value {
      font-family: 'DM Mono', monospace;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
    }

    .kpi-card.gain { border-color: rgba(168,85,247,.35); }
    .kpi-card.gain .kpi-value { color: var(--gain); }
    .kpi-card.loss { border-color: rgba(255,122,48,.35); }
    .kpi-card.loss .kpi-value { color: var(--loss); }

    /* ── Charts row ── */
    .charts-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }

    .chart-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .chart-panel-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .chart-wrap {
      position: relative;
      height: 400px;
    }

    /* ── Holdings table ── */
    .table-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .table-card-header {
      padding: 1rem 1.4rem;
      font-family: 'Space Grotesk', sans-serif;
      font-size: .8rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }

    .table-scroll { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'DM Mono', monospace;
      font-size: .78rem;
    }

    thead tr {
      border-bottom: 1px solid var(--border);
    }

    th {
      padding: .7rem 1rem;
      text-align: right;
      color: var(--muted);
      font-size: .65rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      font-weight: 500;
      white-space: nowrap;
    }
    th:first-child, th:nth-child(2), th:nth-child(3) { text-align: left; }

    td {
      padding: .65rem 1rem;
      text-align: right;
      color: var(--text);
      border-bottom: 1px solid rgba(124,77,255,.06);
      white-space: nowrap;
    }
    td:first-child, td:nth-child(2), td:nth-child(3) { text-align: left; }

    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: rgba(124,77,255,.05); }

    .ticker-cell {
      font-weight: 700;
      color: #fff;
      font-size: .82rem;
    }

    .name-cell {
      color: var(--muted);
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .type-chip {
      display: inline-block;
      padding: .15rem .5rem;
      border-radius: 99px;
      font-size: .6rem;
      letter-spacing: .06em;
      text-transform: uppercase;
      font-weight: 500;
    }
    .chip-asx     { background: rgba(56,189,248,.12);  color: #38bdf8; border: 1px solid rgba(56,189,248,.25); }
    .chip-crypto  { background: rgba(124,77,255,.15);  color: #a855f7; border: 1px solid rgba(124,77,255,.3); }
    .chip-gold,
    .chip-bullion { background: rgba(234,179,8,.12);   color: #eab308; border: 1px solid rgba(234,179,8,.25); }
    .chip-default { background: rgba(152,144,184,.1);  color: #9890b8; border: 1px solid rgba(152,144,184,.2); }

    .pnl-gain { color: var(--gain); }
    .pnl-loss { color: var(--loss); }

    /* ── Loading overlay ── */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 60% 50% at 30% 40%, rgba(124,77,255,.18) 0%, transparent 70%),
        radial-gradient(ellipse 50% 60% at 70% 60%, rgba(168,85,247,.12) 0%, transparent 70%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.4rem;
      z-index: 9999;
      transition: opacity .3s;
    }

    .loading-wordmark {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.3rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #7c4dff, #d946ef, #ff7a30);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(124,77,255,.2);
      border-top-color: var(--purple-hi);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* ── Error overlay ── */
    #error-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 60% 50% at 50% 50%, rgba(255,122,48,.1) 0%, transparent 70%);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      z-index: 9998;
    }

    #error-overlay.visible { display: flex; }

    .error-wordmark {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      background: linear-gradient(90deg, #7c4dff, #d946ef, #ff7a30);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .error-card {
      background: var(--card);
      border: 1px solid rgba(255,122,48,.25);
      border-radius: 16px;
      padding: 2rem 2.4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      min-width: 320px;
      text-align: center;
    }

    .error-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--loss);
    }

    #error-msg {
      font-family: 'DM Mono', monospace;
      font-size: .72rem;
      color: var(--muted);
      max-width: 280px;
      line-height: 1.6;
    }

    @media (max-width: 900px) {
      .kpi-row     { grid-template-columns: repeat(2, 1fr); }
      .charts-row  { grid-template-columns: 1fr; }
    }
    @media (max-width: 520px) {
      .kpi-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Loading overlay -->
  <div id="loading-overlay">
    <div class="loading-wordmark">SPECTRE</div>
    <div class="spinner"></div>
  </div>

  <!-- Error overlay -->
  <div id="error-overlay">
    <div class="error-wordmark">SPECTRE</div>
    <div class="error-card">
      <div class="error-title">Failed to load portfolio</div>
      <div id="error-msg">Unable to fetch data. Please check your connection and try again.</div>
      <button class="btn" id="error-retry-btn">Try Again</button>
    </div>
  </div>

  <!-- Header -->
  <header id="header">
    <span class="header-logo">SPECTRE Analytics</span>
    <div class="header-right">
      <span id="last-updated"></span>
      <a href="/dashboard" class="btn">&#8592; Dashboard</a>
      <button class="btn" id="refresh-btn">&#8635; Refresh</button>
    </div>
  </header>

  <!-- Page content -->
  <main class="page" id="main-content" style="visibility:hidden;">

    <!-- KPI row -->
    <div class="kpi-row">
      <div class="kpi-card" id="kpi-value-card">
        <div class="kpi-label">Portfolio Value</div>
        <div class="kpi-value" id="kpi-value">—</div>
      </div>
      <div class="kpi-card" id="kpi-pnl-card">
        <div class="kpi-label">Total Gain / Loss</div>
        <div class="kpi-value" id="kpi-pnl">—</div>
      </div>
      <div class="kpi-card" id="kpi-pnl-pct-card">
        <div class="kpi-label">Gain / Loss %</div>
        <div class="kpi-value" id="kpi-pnl-pct">—</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">Holdings</div>
        <div class="kpi-value" id="kpi-count">—</div>
      </div>
    </div>

    <!-- Charts row -->
    <div class="charts-row">
      <div class="chart-panel">
        <div class="chart-panel-title">Allocation</div>
        <div class="chart-wrap">
          <canvas id="chart-allocation"></canvas>
        </div>
      </div>
      <div class="chart-panel">
        <div class="chart-panel-title">Gain / Loss</div>
        <div class="chart-wrap">
          <canvas id="chart-pnl"></canvas>
        </div>
      </div>
    </div>

    <!-- Holdings table -->
    <div class="table-card">
      <div class="table-card-header">Holdings</div>
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Ticker</th>
              <th>Name</th>
              <th>Type</th>
              <th>Market Value</th>
              <th>Cost Basis</th>
              <th>P&amp;L</th>
              <th>P&amp;L %</th>
              <th>Price</th>
            </tr>
          </thead>
          <tbody id="holdings-tbody"></tbody>
        </table>
      </div>
    </div>

  </main>

  <script>
    'use strict';

    // ── Mac traffic-light padding ─────────────────────────────────────────────
    if (/Mac/.test(navigator.platform)) {
      document.getElementById('header').classList.add('mac-inset');
      document.body.classList.add('mac-inset');
    }

    // ── Chart.js global defaults ──────────────────────────────────────────────
    Chart.defaults.color = '#9890b8';
    Chart.defaults.font.family = "'DM Mono', monospace";
    Chart.defaults.scale.grid.color = 'rgba(124,77,255,.1)';
    Chart.defaults.borderColor = 'rgba(124,77,255,.1)';

    // ── Palette ───────────────────────────────────────────────────────────────
    const PALETTE = [
      '#7c4dff','#a855f7','#c084fc','#e879f9','#f472b6',
      '#fb923c','#fbbf24','#34d399','#38bdf8','#818cf8',
      '#f87171','#a3e635',
    ];

    const CARD_BG = 'rgba(14,11,26,.97)';

    // ── Chart instances (kept for destroy on re-render) ───────────────────────
    let allocChart = null;
    let pnlChart   = null;

    // ── Formatters ────────────────────────────────────────────────────────────
    function formatAUD(n) {
      return n.toLocaleString('en-AU', {
        style: 'currency', currency: 'AUD',
        minimumFractionDigits: 0, maximumFractionDigits: 0,
      });
    }

    function formatPct(n) {
      return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
    }

    // ── Overlay helpers ───────────────────────────────────────────────────────
    function showLoading() {
      const ol = document.getElementById('loading-overlay');
      ol.classList.remove('hidden');
      document.getElementById('main-content').style.visibility = 'hidden';
    }

    function hideLoading() {
      const ol = document.getElementById('loading-overlay');
      ol.classList.add('hidden');
      document.getElementById('main-content').style.visibility = 'visible';
    }

    function showError(msg) {
      hideLoading();
      document.getElementById('error-msg').textContent = msg || 'An unexpected error occurred.';
      document.getElementById('error-overlay').classList.add('visible');
    }

    function hideError() {
      document.getElementById('error-overlay').classList.remove('visible');
    }

    // ── Boot ──────────────────────────────────────────────────────────────────
    async function boot() {
      showLoading();
      hideError();
      try {
        // Check session
        const sessionRes = await fetch('/api/auth/session', { credentials: 'include' });
        if (!sessionRes.ok) {
          window.location.href = '/signin';
          return;
        }
        const session = await sessionRes.json();
        if (!session || (!session.user && !session.authenticated && !session.userId && !session.id)) {
          window.location.href = '/signin';
          return;
        }

        // Fetch portfolio
        const portRes = await fetch('/api/portfolio', { credentials: 'include' });
        if (!portRes.ok) throw new Error('HTTP ' + portRes.status + ' from /api/portfolio');
        const data = await portRes.json();

        const holdings = data.holdings || data || [];
        render(Array.isArray(holdings) ? holdings : []);
      } catch (err) {
        showError(err.message || 'Failed to load portfolio data.');
      }
    }

    // ── Render ────────────────────────────────────────────────────────────────
    function render(holdings) {
      // ── KPIs ──
      const totalValue = holdings.reduce((s, h) => s + (h.value || 0), 0);
      const totalCost  = holdings.reduce((s, h) => s + (h.costBase || 0), 0);
      const totalPnl   = totalValue - totalCost;
      const pnlPct     = totalCost !== 0 ? (totalPnl / totalCost) * 100 : 0;

      document.getElementById('kpi-value').textContent   = formatAUD(totalValue);
      document.getElementById('kpi-pnl').textContent     = (totalPnl >= 0 ? '+' : '') + formatAUD(totalPnl);
      document.getElementById('kpi-pnl-pct').textContent = formatPct(pnlPct);
      document.getElementById('kpi-count').textContent   = holdings.length;

      // Color gain/loss cards
      const pnlCard    = document.getElementById('kpi-pnl-card');
      const pnlPctCard = document.getElementById('kpi-pnl-pct-card');
      [pnlCard, pnlPctCard].forEach(card => {
        card.classList.remove('gain', 'loss');
        card.classList.add(totalPnl >= 0 ? 'gain' : 'loss');
      });

      // ── Allocation doughnut ──
      if (allocChart) { allocChart.destroy(); allocChart = null; }

      const sorted   = [...holdings].sort((a, b) => (b.value || 0) - (a.value || 0));
      const top10    = sorted.slice(0, 10);
      const other    = sorted.slice(10);
      const otherVal = other.reduce((s, h) => s + (h.value || 0), 0);

      const allocLabels = top10.map(h => h.ticker || h.symbol || h.name || '?');
      const allocData   = top10.map(h => h.value || 0);
      const allocColors = top10.map((_, i) => PALETTE[i % PALETTE.length]);

      if (otherVal > 0) {
        allocLabels.push('Other');
        allocData.push(otherVal);
        allocColors.push('#4a4060');
      }

      const totalForCenter = totalValue;

      // Center-text plugin
      const centerPlugin = {
        id: 'centerText',
        afterDraw(chart) {
          const { ctx, chartArea } = chart;
          if (!chartArea) return;
          const cx = (chartArea.left + chartArea.right) / 2;
          const cy = (chartArea.top + chartArea.bottom) / 2;
          ctx.save();
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.font = "700 1rem 'Space Grotesk', sans-serif";
          ctx.fillStyle = '#f2eeff';
          ctx.fillText(formatAUD(totalForCenter), cx, cy);
          ctx.restore();
        },
      };

      allocChart = new Chart(document.getElementById('chart-allocation'), {
        type: 'doughnut',
        data: {
          labels: allocLabels,
          datasets: [{
            data: allocData,
            backgroundColor: allocColors,
            borderWidth: 2,
            borderColor: CARD_BG,
            hoverBorderColor: '#7c4dff',
            hoverBorderWidth: 2,
          }],
        },
        options: {
          cutout: '72%',
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              position: 'bottom',
              labels: {
                font: { family: "'DM Mono', monospace", size: 10 },
                color: '#9890b8',
                boxWidth: 10,
                padding: 10,
              },
            },
            tooltip: {
              callbacks: {
                label(ctx) {
                  return ' ' + formatAUD(ctx.parsed) + ' (' + ((ctx.parsed / totalValue) * 100).toFixed(1) + '%)';
                },
              },
            },
          },
        },
        plugins: [centerPlugin],
      });

      // ── PnL horizontal bar chart ──
      if (pnlChart) { pnlChart.destroy(); pnlChart = null; }

      const pnlSorted = [...holdings]
        .filter(h => (h.costBase || 0) !== 0)
        .map(h => ({
          label: h.ticker || h.symbol || h.name || '?',
          pnlPct: ((h.value - h.costBase) / h.costBase) * 100,
        }))
        .sort((a, b) => b.pnlPct - a.pnlPct);

      const barLabels = pnlSorted.map(h => h.label);
      const barData   = pnlSorted.map(h => h.pnlPct);
      const barColors = barData.map(v => v >= 0 ? 'rgba(168,85,247,.75)' : 'rgba(255,122,48,.75)');

      pnlChart = new Chart(document.getElementById('chart-pnl'), {
        type: 'bar',
        data: {
          labels: barLabels,
          datasets: [{
            data: barData,
            backgroundColor: barColors,
            borderRadius: 4,
            maxBarThickness: 22,
          }],
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label(ctx) { return ' ' + formatPct(ctx.parsed.x); },
              },
            },
          },
          scales: {
            x: {
              grid: { color: 'rgba(124,77,255,.1)' },
              ticks: {
                font: { family: "'DM Mono', monospace", size: 10 },
                color: '#9890b8',
                callback(v) { return (v >= 0 ? '+' : '') + v.toFixed(1) + '%'; },
              },
            },
            y: {
              grid: { display: false },
              ticks: {
                font: { family: "'DM Mono', monospace", size: 10 },
                color: '#9890b8',
              },
            },
          },
        },
      });

      // ── Holdings table ──
      const tbody = document.getElementById('holdings-tbody');
      tbody.innerHTML = '';

      const tableRows = [...holdings].sort((a, b) => (b.value || 0) - (a.value || 0));

      for (const h of tableRows) {
        const val     = h.value    || 0;
        const cost    = h.costBase || 0;
        const pnl     = val - cost;
        const pct     = cost !== 0 ? (pnl / cost) * 100 : 0;
        const isGain  = pnl >= 0;
        const typeRaw = (h.source || h.type || '').toUpperCase();

        let chipClass = 'chip-default';
        if      (typeRaw === 'ASX')                        chipClass = 'chip-asx';
        else if (typeRaw === 'CRYPTO')                     chipClass = 'chip-crypto';
        else if (typeRaw === 'GOLD' || typeRaw === 'BULLION') chipClass = 'chip-bullion';

        const price = h.price != null
          ? h.price.toLocaleString('en-AU', { style: 'currency', currency: 'AUD', minimumFractionDigits: 2, maximumFractionDigits: 4 })
          : '—';

        const tr = document.createElement('tr');
        tr.innerHTML =
          '<td class="ticker-cell">'  + escHtml(h.ticker || h.symbol || '—') + '</td>' +
          '<td class="name-cell">'    + escHtml(h.name   || '—')             + '</td>' +
          '<td><span class="type-chip ' + chipClass + '">' + escHtml(typeRaw || '—') + '</span></td>' +
          '<td>'                      + formatAUD(val)  + '</td>' +
          '<td>'                      + formatAUD(cost) + '</td>' +
          '<td class="' + (isGain ? 'pnl-gain' : 'pnl-loss') + '">' + (pnl >= 0 ? '+' : '') + formatAUD(pnl) + '</td>' +
          '<td class="' + (isGain ? 'pnl-gain' : 'pnl-loss') + '">' + formatPct(pct)         + '</td>' +
          '<td>'                      + price           + '</td>';
        tbody.appendChild(tr);
      }

      // ── Timestamp ──
      const now = new Date();
      document.getElementById('last-updated').textContent =
        'Updated ' + now.toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

      hideLoading();
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Event listeners ───────────────────────────────────────────────────────
    document.getElementById('refresh-btn').addEventListener('click', boot);
    document.getElementById('error-retry-btn').addEventListener('click', boot);

    // ── Start ─────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', boot);
  </script>
</body>
</html>
