<svg width="344" height="82" viewBox="0 0 344 82" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SPECTRE Wordmark</title>
  <desc id="desc">Red SPECTRE wordmark on a dark high-contrast striped plate.</desc>
  <defs>
    <linearGradient id="plate" x1="0" y1="0" x2="344" y2="82" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F1118"/>
      <stop offset="1" stop-color="#08090E"/>
    </linearGradient>
    <pattern id="stripes" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(26)">
      <rect width="3" height="10" fill="#FF4B33" fill-opacity="0.24"/>
      <rect x="5" width="1" height="10" fill="#FFFFFF" fill-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="344" height="82" fill="url(#plate)"/>
  <rect width="344" height="82" fill="url(#stripes)"/>

  <text
    x="172"
    y="55"
    text-anchor="middle"
    font-family="Sora, Montserrat, 'Arial Black', Arial, sans-serif"
    font-size="52"
    font-weight="800"
    letter-spacing="9"
    fill="#FF4B33"
  >SPECTRE</text>
</svg>
