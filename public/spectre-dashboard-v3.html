<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SPECTRE</title>
<meta http-equiv="refresh" content="0; url=/classic" />
<style>
  :root {
    color-scheme: dark;
  }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    background: radial-gradient(circle at 20% 20%, #24103f 0%, #120a22 45%, #09060f 100%);
    color: #f2eeff;
    font-family: "DM Sans", system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  }
  .shell {
    width: min(520px, 100%);
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 14px;
    background: rgba(12, 8, 24, 0.85);
    padding: 18px 20px;
  }
  h1 {
    margin: 0 0 8px;
    font-size: 1rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-family: "DM Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    color: #c084fc;
  }
  p {
    margin: 0;
    line-height: 1.6;
    color: #cbc6dc;
    font-size: 0.95rem;
  }
  a {
    color: #ff8f7b;
  }
</style>
<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const demo = params.get("demo") === "1" || params.get("mode") === "demo";
  const target = demo ? "/classic?demo=1" : "/classic";
  window.location.replace(target + window.location.hash);
})();
</script>
</head>
<body>
  <main class="shell" role="status" aria-live="polite">
    <h1>SPECTRE</h1>
    <p>Opening the fresh dashboard design. If this does not redirect, <a id="continue-link" href="/classic">continue here</a>.</p>
  </main>
  <script>
    (function () {
      const link = document.getElementById("continue-link");
      if (!link) return;
      const params = new URLSearchParams(window.location.search);
      const demo = params.get("demo") === "1" || params.get("mode") === "demo";
      link.href = demo ? "/classic?demo=1" : "/classic";
    })();
  </script>
</body>
</html>
