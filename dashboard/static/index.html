<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TRADING TERMINAL</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d1117;
    --bg2:       #161b22;
    --bg3:       #21262d;
    --border:    #30363d;
    --green:     #3fb950;
    --green-dim: #238636;
    --cyan:      #58a6ff;
    --cyan-dim:  #1f6feb;
    --red:       #f85149;
    --yellow:    #d29922;
    --white:     #e6edf3;
    --muted:     #8b949e;
    --font:      'Courier New', Courier, monospace;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--white);
    font-family: var(--font);
    font-size: 13px;
    overflow: hidden;
  }

  /* ── Header ─────────────────────────────────────────────────────────── */
  #header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 8px 16px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    height: 44px;
  }
  #header .logo {
    color: var(--green);
    font-size: 15px;
    font-weight: bold;
    letter-spacing: 3px;
  }
  #header .clock {
    color: var(--muted);
    font-size: 12px;
    margin-left: auto;
  }

  /* ── Tabs ────────────────────────────────────────────────────────────── */
  #tabs {
    display: flex;
    gap: 0;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    padding: 8px 22px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    font-family: var(--font);
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn:hover { color: var(--white); }
  .tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }

  /* ── Main layout ─────────────────────────────────────────────────────── */
  #main {
    height: calc(100vh - 44px - 35px);
    overflow: hidden;
  }
  .tab-panel { display: none; height: 100%; }
  .tab-panel.active { display: flex; flex-direction: column; height: 100%; }

  /* ── Generic controls ────────────────────────────────────────────────── */
  button {
    background: var(--bg3);
    color: var(--white);
    border: 1px solid var(--border);
    padding: 5px 12px;
    font-family: var(--font);
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  button:hover { background: var(--border); border-color: var(--cyan); color: var(--cyan); }
  button.primary { background: var(--green-dim); border-color: var(--green); color: var(--green); }
  button.primary:hover { background: var(--green); color: var(--bg); }
  button.danger { border-color: var(--red); color: var(--red); }
  button.danger:hover { background: var(--red); color: var(--bg); }

  input[type="text"], input[type="number"] {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--white);
    padding: 5px 8px;
    font-family: var(--font);
    font-size: 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  input:focus { border-color: var(--cyan); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* ── STATUS BAR ──────────────────────────────────────────────────────── */
  #statusbar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 22px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 12px;
    gap: 16px;
    font-size: 11px;
    color: var(--muted);
    z-index: 100;
  }
  #statusbar .status-item { display: flex; gap: 6px; }
  #statusbar .status-label { color: var(--muted); }
  #statusbar .status-val { color: var(--cyan); }

  /* ═══════════════════════════════════════════════════════════════════════
     CHAT TAB
  ══════════════════════════════════════════════════════════════════════════ */
  #chat-panel { flex: 1; overflow: hidden; }

  #chat-history {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: var(--bg);
    height: calc(100% - 55px);
  }

  .msg { max-width: 90%; display: flex; flex-direction: column; gap: 3px; }
  .msg.user { align-self: flex-end; }
  .msg.assistant { align-self: flex-start; }
  .msg-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; }
  .msg-label.user-label { text-align: right; color: var(--cyan); }
  .msg-label.ai-label { color: var(--green); }
  .msg-text {
    background: var(--bg2);
    border: 1px solid var(--border);
    padding: 8px 12px;
    white-space: pre-wrap;
    line-height: 1.5;
    font-size: 13px;
  }
  .msg.user .msg-text { border-color: var(--cyan-dim); color: var(--cyan); }
  .msg.assistant .msg-text { border-color: var(--green-dim); color: var(--green); }

  #chat-input-row {
    display: flex;
    gap: 6px;
    padding: 8px 12px;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    align-items: center;
  }
  #chat-input {
    flex: 1;
    resize: none;
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--white);
    padding: 6px 10px;
    font-family: var(--font);
    font-size: 13px;
    outline: none;
    height: 36px;
  }
  #chat-input:focus { border-color: var(--cyan); }

  /* ═══════════════════════════════════════════════════════════════════════
     SCANNER TAB
  ══════════════════════════════════════════════════════════════════════════ */
  #scan-panel { overflow-y: auto; }

  #scan-toolbar {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 10px 14px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    align-items: center;
  }
  #custom-tickers { width: 240px; }
  #scan-meta { font-size: 11px; color: var(--muted); margin-left: auto; }

  #scan-results {
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    overflow-y: auto;
  }

  .anomaly-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--border);
    padding: 10px 14px;
    display: grid;
    grid-template-columns: 80px 1fr auto;
    gap: 8px;
    align-items: start;
  }
  .anomaly-card.HIGH { border-left-color: var(--red); }
  .anomaly-card.MEDIUM { border-left-color: var(--yellow); }
  .anomaly-card.LOW { border-left-color: var(--green); }
  .card-ticker { font-size: 16px; font-weight: bold; color: var(--white); }
  .card-severity.HIGH { color: var(--red); font-size: 11px; }
  .card-severity.MEDIUM { color: var(--yellow); font-size: 11px; }
  .card-severity.LOW { color: var(--green); font-size: 11px; }
  .card-body { color: var(--muted); font-size: 12px; line-height: 1.6; }
  .card-body strong { color: var(--white); }
  .card-price { color: var(--cyan); font-size: 13px; text-align: right; }

  .scan-empty { color: var(--muted); font-size: 13px; padding: 20px; text-align: center; }

  /* ═══════════════════════════════════════════════════════════════════════
     HOLDINGS TAB
  ══════════════════════════════════════════════════════════════════════════ */
  #holdings-panel { overflow-y: auto; }

  #holdings-add-row {
    display: flex;
    gap: 8px;
    padding: 10px 14px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    align-items: center;
    flex-wrap: wrap;
  }
  #holdings-add-row input { width: 110px; }
  #add-ticker-input { width: 90px; text-transform: uppercase; }

  #holdings-table-wrap {
    overflow-x: auto;
    padding: 12px 14px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  th {
    text-align: left;
    color: var(--muted);
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    letter-spacing: 1px;
    font-size: 11px;
  }
  td {
    padding: 7px 10px;
    border-bottom: 1px solid #21262d;
    color: var(--white);
  }
  tr:hover td { background: var(--bg2); }
  .pos { color: var(--green); }
  .neg { color: var(--red); }
  .muted { color: var(--muted); }

  #holdings-footer {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--bg2);
  }
  #total-value { color: var(--cyan); font-size: 15px; font-weight: bold; }

  .spinner {
    display: inline-block;
    width: 12px; height: 12px;
    border: 2px solid var(--border);
    border-top-color: var(--cyan);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-left: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────── -->
<div id="header">
  <span class="logo">▸ TRADING TERMINAL</span>
  <span style="color:var(--muted);font-size:11px">OLLAMA: <span id="ollama-status" style="color:var(--yellow)">checking…</span></span>
  <span class="clock" id="clock">--:--:--</span>
</div>

<!-- ── Tabs ───────────────────────────────────────────────────────────── -->
<div id="tabs">
  <button class="tab-btn active" data-tab="chat">CHAT</button>
  <button class="tab-btn" data-tab="scan">SCANNER</button>
  <button class="tab-btn" data-tab="holdings">HOLDINGS</button>
</div>

<!-- ── Main ───────────────────────────────────────────────────────────── -->
<div id="main">

  <!-- ══ CHAT ════════════════════════════════════════════════════════════ -->
  <div class="tab-panel active" id="chat-panel">
    <div id="chat-history"></div>
    <div id="chat-input-row">
      <input id="chat-input" type="text" placeholder="Ask about markets, positions, or paste scan results…" autocomplete="off"/>
      <button class="primary" id="chat-send-btn" onclick="sendChat()">SEND</button>
      <button onclick="clearChat()" style="color:var(--muted)">CLEAR</button>
    </div>
  </div>

  <!-- ══ SCANNER ═════════════════════════════════════════════════════════ -->
  <div class="tab-panel" id="scan-panel">
    <div id="scan-toolbar">
      <button onclick="setWatchlist('mag7')">Mag 7</button>
      <button onclick="setWatchlist('tech')">Tech</button>
      <button onclick="setWatchlist('custom')">Custom</button>
      <input id="custom-tickers" type="text" placeholder="AAPL,TSLA,NVDA" value="AAPL,TSLA,NVDA"/>
      <button class="primary" id="scan-btn" onclick="runScan()">▶ RUN SCAN</button>
      <button onclick="sendScanToOllama()" id="analyze-btn" style="display:none">⬡ ANALYZE WITH AI</button>
      <span id="scan-meta"></span>
    </div>
    <div id="scan-results">
      <div class="scan-empty">Select a watchlist and run scan.</div>
    </div>
  </div>

  <!-- ══ HOLDINGS ════════════════════════════════════════════════════════ -->
  <div class="tab-panel" id="holdings-panel">
    <div id="holdings-add-row">
      <span style="color:var(--muted);font-size:11px">ADD POSITION:</span>
      <input id="add-ticker-input" type="text" placeholder="TICKER"/>
      <input id="add-shares-input" type="number" placeholder="Shares" step="0.01" style="width:90px"/>
      <input id="add-cost-input" type="number" placeholder="Avg Cost" step="0.01" style="width:100px"/>
      <button class="primary" onclick="addHolding()">+ ADD</button>
      <button onclick="refreshPrices()" id="refresh-btn" style="margin-left:8px">↻ REFRESH PRICES</button>
    </div>
    <div id="holdings-table-wrap">
      <table id="holdings-table">
        <thead>
          <tr>
            <th>TICKER</th>
            <th>SHARES</th>
            <th>AVG COST</th>
            <th>CURRENT</th>
            <th>P&amp;L $</th>
            <th>P&amp;L %</th>
            <th>VALUE</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="holdings-body">
          <tr><td colspan="8" style="color:var(--muted);text-align:center;padding:20px">Loading…</td></tr>
        </tbody>
      </table>
    </div>
    <div id="holdings-footer">
      <span style="color:var(--muted);font-size:11px">TOTAL PORTFOLIO VALUE</span>
      <span id="total-value">$0.00</span>
    </div>
  </div>

</div><!-- /main -->

<!-- ── Status bar ─────────────────────────────────────────────────────── -->
<div id="statusbar">
  <span class="status-item"><span class="status-label">LAST SCAN:</span><span class="status-val" id="sb-scan">—</span></span>
  <span class="status-item"><span class="status-label">HOLDINGS:</span><span class="status-val" id="sb-holdings">0</span></span>
  <span class="status-item"><span class="status-label">PORTFOLIO:</span><span class="status-val" id="sb-portfolio">$0.00</span></span>
  <span class="status-item" style="margin-left:auto"><span class="status-label">STATUS:</span><span class="status-val" id="sb-status">READY</span></span>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════════════════════════ */
let lastScanResults = [];
let holdings = [];
let prices = {};
let chatStreaming = false;

/* ═══════════════════════════════════════════════════════════════════════════
   CLOCK + OLLAMA STATUS
══════════════════════════════════════════════════════════════════════════════ */
function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('en-US', {hour12: false});
}
setInterval(updateClock, 1000);
updateClock();

async function checkOllama() {
  const el = document.getElementById('ollama-status');
  try {
    const r = await fetch('http://localhost:11434/', {signal: AbortSignal.timeout(3000)});
    if (r.ok || r.status < 500) { el.textContent = 'ONLINE'; el.style.color = 'var(--green)'; }
    else { el.textContent = 'ERROR'; el.style.color = 'var(--red)'; }
  } catch { el.textContent = 'OFFLINE'; el.style.color = 'var(--red)'; }
}
checkOllama();
setInterval(checkOllama, 30000);

/* ═══════════════════════════════════════════════════════════════════════════
   TABS
══════════════════════════════════════════════════════════════════════════════ */
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(btn.dataset.tab + '-panel').classList.add('active');
  });
});

/* ═══════════════════════════════════════════════════════════════════════════
   CHAT
══════════════════════════════════════════════════════════════════════════════ */
function appendMsg(role, text) {
  const hist = document.getElementById('chat-history');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  const label = document.createElement('div');
  label.className = `msg-label ${role === 'user' ? 'user-label' : 'ai-label'}`;
  label.textContent = role === 'user' ? 'YOU' : 'ANALYST';
  const textEl = document.createElement('div');
  textEl.className = 'msg-text';
  textEl.textContent = text;
  div.appendChild(label);
  div.appendChild(textEl);
  hist.appendChild(div);
  hist.scrollTop = hist.scrollHeight;
  return textEl;
}

function clearChat() {
  document.getElementById('chat-history').innerHTML = '';
}

async function sendChat(overrideMsg) {
  if (chatStreaming) return;
  const input = document.getElementById('chat-input');
  const message = overrideMsg || input.value.trim();
  if (!message) return;

  input.value = '';
  appendMsg('user', message);

  const btn = document.getElementById('chat-send-btn');
  btn.disabled = true;
  btn.textContent = '…';
  chatStreaming = true;
  setStatus('STREAMING…');

  const aiEl = appendMsg('assistant', '');
  let buffer = '';

  try {
    const resp = await fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message})
    });

    const reader = resp.body.getReader();
    const dec = new TextDecoder();
    let leftover = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      leftover += dec.decode(value, {stream: true});
      const lines = leftover.split('\n');
      leftover = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const token = line.slice(6);
        if (token === '[DONE]') break;
        // unescape newlines encoded server-side
        buffer += token.replace(/\\n/g, '\n');
        aiEl.textContent = buffer;
        document.getElementById('chat-history').scrollTop = document.getElementById('chat-history').scrollHeight;
      }
    }
  } catch (e) {
    aiEl.textContent = 'Error: ' + e.message;
  }

  btn.disabled = false;
  btn.textContent = 'SEND';
  chatStreaming = false;
  setStatus('READY');
}

document.getElementById('chat-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
});

/* ═══════════════════════════════════════════════════════════════════════════
   SCANNER
══════════════════════════════════════════════════════════════════════════════ */
const WATCHLISTS = {
  mag7: 'AAPL,MSFT,NVDA,GOOGL,AMZN,META,TSLA',
  tech: 'AMD,INTC,QCOM,AVGO,CRM,ORCL,ADBE',
};

function setWatchlist(name) {
  const input = document.getElementById('custom-tickers');
  if (WATCHLISTS[name]) {
    input.value = WATCHLISTS[name];
  }
  // else leave as-is for custom
}

async function runScan() {
  const tickers = document.getElementById('custom-tickers').value.trim();
  if (!tickers) return;
  const btn = document.getElementById('scan-btn');
  btn.disabled = true;
  btn.innerHTML = 'SCANNING<span class="spinner"></span>';
  setStatus('SCANNING ' + tickers);

  const resultsDiv = document.getElementById('scan-results');
  resultsDiv.innerHTML = '<div class="scan-empty">Fetching data…</div>';

  try {
    const r = await fetch('/scan?tickers=' + encodeURIComponent(tickers));
    const data = await r.json();
    lastScanResults = data;
    renderScanResults(data);
    const now = new Date().toLocaleTimeString('en-US', {hour12: false});
    document.getElementById('scan-meta').textContent = `Last scan: ${now} • ${data.length} anomaly(ies)`;
    document.getElementById('sb-scan').textContent = now;
    document.getElementById('analyze-btn').style.display = data.length > 0 ? 'inline-block' : 'none';
  } catch (e) {
    resultsDiv.innerHTML = `<div class="scan-empty" style="color:var(--red)">Error: ${e.message}</div>`;
  }

  btn.disabled = false;
  btn.innerHTML = '▶ RUN SCAN';
  setStatus('READY');
}

function renderScanResults(results) {
  const div = document.getElementById('scan-results');
  if (!results || results.length === 0) {
    div.innerHTML = '<div class="scan-empty">No anomalies detected in this watchlist.</div>';
    return;
  }
  div.innerHTML = '';
  // Sort: HIGH first, then MEDIUM, then LOW
  const order = {HIGH: 0, MEDIUM: 1, LOW: 2};
  results.sort((a, b) => (order[a.severity] ?? 3) - (order[b.severity] ?? 3));

  results.forEach(item => {
    const card = document.createElement('div');
    card.className = `anomaly-card ${item.severity || 'LOW'}`;

    // Build detail lines
    const details = [];
    if (item.rsi !== undefined) details.push(`RSI: <strong>${item.rsi?.toFixed(1) ?? '—'}</strong>`);
    if (item.volume_ratio !== undefined) details.push(`Vol Ratio: <strong>${item.volume_ratio?.toFixed(2) ?? '—'}x</strong>`);
    if (item.price_change_pct !== undefined) details.push(`Δ Price: <strong>${item.price_change_pct?.toFixed(2) ?? '—'}%</strong>`);
    if (item.bb_position !== undefined) details.push(`BB Pos: <strong>${item.bb_position?.toFixed(2) ?? '—'}</strong>`);
    if (item.macd_histogram !== undefined) details.push(`MACD Hist: <strong>${item.macd_histogram?.toFixed(4) ?? '—'}</strong>`);

    card.innerHTML = `
      <div>
        <div class="card-ticker">${item.ticker || '?'}</div>
        <div class="card-severity ${item.severity}">${item.severity || ''}</div>
      </div>
      <div class="card-body">
        ${item.signal || item.anomaly || item.reason || 'Anomaly detected'}
        ${details.length ? '<br/>' + details.join(' &nbsp;│&nbsp; ') : ''}
      </div>
      <div class="card-price">
        ${item.price !== undefined ? '$' + Number(item.price).toFixed(2) : ''}
      </div>
    `;
    div.appendChild(card);
  });
}

function sendScanToOllama() {
  if (!lastScanResults.length) return;
  const summary = lastScanResults.map(r =>
    `${r.ticker} [${r.severity}]: ${r.signal || r.anomaly || r.reason || 'anomaly'} | RSI:${r.rsi?.toFixed(1)??'?'} VolRatio:${r.volume_ratio?.toFixed(2)??'?'}x Price:${r.price_change_pct?.toFixed(2)??'?'}%`
  ).join('\n');
  const msg = `Analyze these market scan anomalies and give brief trading insights:\n\n${summary}`;
  // Switch to chat tab
  document.querySelector('[data-tab="chat"]').click();
  sendChat(msg);
}

/* ═══════════════════════════════════════════════════════════════════════════
   HOLDINGS
══════════════════════════════════════════════════════════════════════════════ */
async function loadHoldings() {
  try {
    const r = await fetch('/holdings');
    holdings = await r.json();
    await loadPrices();
  } catch (e) {
    console.error('Holdings load error:', e);
  }
}

async function loadPrices() {
  if (!holdings.length) { renderHoldings(); return; }
  try {
    const r = await fetch('/prices');
    prices = await r.json();
  } catch { prices = {}; }
  renderHoldings();
}

function renderHoldings() {
  const tbody = document.getElementById('holdings-body');
  tbody.innerHTML = '';

  if (!holdings.length) {
    tbody.innerHTML = '<tr><td colspan="8" style="color:var(--muted);text-align:center;padding:20px">No positions. Add one above.</td></tr>';
    document.getElementById('total-value').textContent = '$0.00';
    document.getElementById('sb-holdings').textContent = '0';
    document.getElementById('sb-portfolio').textContent = '$0.00';
    return;
  }

  let totalValue = 0;
  holdings.forEach(h => {
    const p = prices[h.ticker] || {};
    const currentPrice = p.price ?? h.current_price ?? null;
    const pnlDollar = currentPrice !== null ? (currentPrice - h.avg_cost) * h.shares : null;
    const pnlPct = currentPrice !== null && h.avg_cost > 0 ? ((currentPrice - h.avg_cost) / h.avg_cost * 100) : null;
    const value = currentPrice !== null ? currentPrice * h.shares : null;
    if (value) totalValue += value;

    const posNeg = v => v === null ? '' : v >= 0 ? 'pos' : 'neg';
    const fmt = v => v === null ? '<span class="muted">—</span>' : v;
    const fmtDollar = v => v === null ? '<span class="muted">—</span>' : `<span class="${posNeg(v)}">${v >= 0 ? '+' : ''}$${Math.abs(v).toFixed(2)}</span>`;
    const fmtPct = v => v === null ? '<span class="muted">—</span>' : `<span class="${posNeg(v)}">${v >= 0 ? '+' : ''}${v.toFixed(2)}%</span>`;
    const fmtVal = v => v === null ? '<span class="muted">—</span>' : `$${v.toFixed(2)}`;

    const changePct = p.change_pct;
    const priceHtml = currentPrice === null
      ? '<span class="muted">—</span>'
      : `$${currentPrice.toFixed(2)} <span class="${posNeg(changePct)}" style="font-size:11px">${changePct !== null && changePct !== undefined ? (changePct >= 0 ? '+' : '') + changePct.toFixed(2) + '%' : ''}</span>`;

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="color:var(--cyan);font-weight:bold">${h.ticker}</td>
      <td>${h.shares}</td>
      <td>$${h.avg_cost.toFixed(2)}</td>
      <td>${priceHtml}</td>
      <td>${fmtDollar(pnlDollar)}</td>
      <td>${fmtPct(pnlPct)}</td>
      <td>${fmtVal(value)}</td>
      <td><button class="danger" onclick="deleteHolding('${h.ticker}')">✕</button></td>
    `;
    tbody.appendChild(tr);
  });

  const fmtTotal = `$${totalValue.toFixed(2)}`;
  document.getElementById('total-value').textContent = fmtTotal;
  document.getElementById('sb-holdings').textContent = holdings.length;
  document.getElementById('sb-portfolio').textContent = fmtTotal;
}

async function addHolding() {
  const ticker = document.getElementById('add-ticker-input').value.trim().toUpperCase();
  const shares = parseFloat(document.getElementById('add-shares-input').value);
  const avg_cost = parseFloat(document.getElementById('add-cost-input').value);

  if (!ticker || isNaN(shares) || isNaN(avg_cost)) {
    setStatus('FILL ALL FIELDS');
    return;
  }

  setStatus('ADDING ' + ticker + '…');
  try {
    const r = await fetch('/holdings', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ticker, shares, avg_cost})
    });
    holdings = await r.json();
    document.getElementById('add-ticker-input').value = '';
    document.getElementById('add-shares-input').value = '';
    document.getElementById('add-cost-input').value = '';
    await loadPrices();
  } catch (e) {
    setStatus('ERROR: ' + e.message);
    return;
  }
  setStatus('READY');
}

async function deleteHolding(ticker) {
  try {
    const r = await fetch('/holdings/' + ticker, {method: 'DELETE'});
    holdings = await r.json();
    await loadPrices();
  } catch (e) { setStatus('ERROR: ' + e.message); }
}

async function refreshPrices() {
  const btn = document.getElementById('refresh-btn');
  btn.disabled = true;
  btn.innerHTML = 'REFRESHING<span class="spinner"></span>';
  setStatus('FETCHING PRICES…');
  await loadPrices();
  btn.disabled = false;
  btn.innerHTML = '↻ REFRESH PRICES';
  setStatus('READY');
}

/* ═══════════════════════════════════════════════════════════════════════════
   UTIL
══════════════════════════════════════════════════════════════════════════════ */
function setStatus(msg) {
  document.getElementById('sb-status').textContent = msg;
}

/* ═══════════════════════════════════════════════════════════════════════════
   INIT
══════════════════════════════════════════════════════════════════════════════ */
loadHoldings();
</script>
