<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SPECTRE — Charts</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #07050f;
  --bg2:     #0d0a1a;
  --bg3:     #110e20;
  --border:  rgba(124,77,255,.14);
  --border2: rgba(124,77,255,.28);
  --purple:  #7c4dff;
  --phi:     #a855f7;
  --orange:  #ff7a30;
  --up:      #22c55e;
  --dn:      #ef4444;
  --text:    #e4dcff;
  --muted:   #6b6490;
  --dim:     #332e54;
  --mono:    'DM Mono','Courier New',monospace;
  --sans:    'Space Grotesk',-apple-system,sans-serif;
  --hdr:     48px;
  --side:    264px;
  --hdr-bg:  rgba(5,3,12,.97);
  --drop-bg: #0d0a1a;
}

html.light {
  --bg:      #ddd6f3;
  --bg2:     #d0c7ee;
  --bg3:     rgba(0,0,0,.06);
  --border:  rgba(124,77,255,.2);
  --border2: rgba(124,77,255,.4);
  --text:    #0f0d1e;
  --muted:   #5e5a78;
  --dim:     #9490b4;
  --hdr-bg:  rgba(233,228,246,.97);
  --drop-bg: #d0c7ee;
}

html, body { height:100%; background:var(--bg); color:var(--text); font-family:var(--sans); overflow:hidden; -webkit-font-smoothing:antialiased; }
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(124,77,255,.25); border-radius:2px; }

/* ── header ── */
#hdr {
  position:fixed; top:0; left:0; right:0; height:var(--hdr);
  background:var(--hdr-bg); border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:8px; padding:0 14px;
  z-index:500; -webkit-app-region:drag; user-select:none;
  backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px);
}
.mac #hdr { padding-left:82px; }

.logo { font-size:.68rem; font-weight:800; letter-spacing:.24em; background:linear-gradient(90deg,#7c4dff 0%,#d946ef 52%,#ff7a30 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; flex-shrink:0; }
.vdiv { width:1px; height:18px; background:var(--border); flex-shrink:0; }

/* search box */
#search-wrap {
  -webkit-app-region:no-drag;
  position:relative; flex-shrink:0; width:220px;
}
#search-input {
  width:100%; background:var(--bg3); border:1px solid var(--border);
  border-radius:7px; color:var(--text); font-family:var(--mono); font-size:.7rem;
  padding:5px 10px 5px 28px; outline:none; transition:border-color .12s;
}
#search-input:focus { border-color:var(--border2); }
#search-input::placeholder { color:var(--muted); }
.search-icon { position:absolute; left:9px; top:50%; transform:translateY(-50%); font-size:.75rem; color:var(--muted); pointer-events:none; }

/* autocomplete dropdown */
#search-drop {
  display:none; position:absolute; top:calc(100% + 4px); left:0; right:0;
  background:var(--drop-bg); border:1px solid var(--border2); border-radius:8px;
  overflow:hidden; z-index:9999; box-shadow:0 8px 32px rgba(0,0,0,.6);
  max-height:320px; overflow-y:auto;
}
#search-drop.open { display:block; }
.drop-section { padding:6px 10px 4px; font-family:var(--mono); font-size:.52rem; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); border-bottom:1px solid var(--border); }
.drop-item {
  display:flex; align-items:center; gap:8px; padding:8px 10px; cursor:pointer; transition:background .1s;
}
.drop-item:hover, .drop-item.focused { background:rgba(124,77,255,.14); }
.drop-sym  { font-family:var(--mono); font-size:.72rem; font-weight:600; color:var(--text); width:60px; flex-shrink:0; }
.drop-name { font-size:.64rem; color:var(--muted); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.drop-exch { font-family:var(--mono); font-size:.56rem; color:var(--dim); flex-shrink:0; }
.drop-port { font-family:var(--mono); font-size:.54rem; color:var(--phi); flex-shrink:0; background:rgba(168,85,247,.1); border-radius:3px; padding:1px 5px; }

/* timeframe + chart type pills */
.pill-row { -webkit-app-region:no-drag; display:flex; gap:2px; }
.pill { background:transparent; border:1px solid transparent; border-radius:5px; color:var(--muted); font-family:var(--mono); font-size:.6rem; letter-spacing:.06em; padding:3px 7px; cursor:pointer; transition:all .1s; flex-shrink:0; }
.pill:hover { color:var(--text); border-color:var(--border); }
.pill.on   { color:var(--phi);    background:rgba(124,77,255,.16); border-color:rgba(124,77,255,.3); }
.pill.on-o { color:var(--orange); background:rgba(255,122,48,.12); border-color:rgba(255,122,48,.28); }

/* price strip */
#price-strip { margin-left:auto; display:flex; align-items:center; gap:7px; -webkit-app-region:no-drag; flex-shrink:0; }
#p-sym  { font-family:var(--mono); font-size:.6rem; color:var(--muted); letter-spacing:.1em; }
#p-last { font-family:var(--mono); font-size:1rem; font-weight:500; }
#p-chg  { font-family:var(--mono); font-size:.72rem; }
.up-c { color:var(--up); }
.dn-c { color:var(--dn); }

/* add to watchlist btn */
#add-btn {
  -webkit-app-region:no-drag; display:none;
  background:rgba(124,77,255,.12); border:1px solid var(--border); border-radius:6px;
  color:var(--phi); font-family:var(--sans); font-size:.62rem; font-weight:600;
  padding:3px 9px; cursor:pointer; transition:all .12s; flex-shrink:0;
}
#add-btn:hover { background:rgba(124,77,255,.24); border-color:var(--border2); }
#add-btn.in-wl { color:var(--muted); background:transparent; }

.app-nav-tabs { -webkit-app-region:no-drag; display:flex; align-items:center; gap:2px; background:rgba(124,77,255,.08); border:1px solid rgba(124,77,255,.2); border-radius:8px; padding:3px; flex-shrink:0; }
.app-nav-tab { font-family:var(--sans); font-size:.72rem; font-weight:500; letter-spacing:.03em; color:var(--muted); background:none; border:none; border-radius:5px; padding:.3rem .9rem; cursor:pointer; text-decoration:none; transition:color .15s,background .15s; white-space:nowrap; }
.app-nav-tab:hover { color:var(--text); background:rgba(124,77,255,.1); }
.app-nav-tab-active { color:#d4c0f0 !important; background:rgba(124,77,255,.18) !important; cursor:default; }

/* ── layout ── */
#layout { display:flex; height:100vh; padding-top:var(--hdr); }
#chart-col { flex:1; display:flex; flex-direction:column; min-width:0; background:var(--bg); }
#main-wrap { flex:1; position:relative; min-height:0; }
#main-chart { position:absolute; inset:0; }
#vol-wrap { height:72px; flex-shrink:0; position:relative; border-top:1px solid var(--border); background:var(--bg); }
#vol-chart { position:absolute; inset:0; }

/* ── sidebar ── */
#sidebar { width:var(--side); flex-shrink:0; display:flex; flex-direction:column; background:var(--bg2); border-left:1px solid var(--border); overflow:hidden; }

#kpis { display:grid; grid-template-columns:1fr 1fr; border-bottom:1px solid var(--border); flex-shrink:0; }
.kpi-cell { padding:9px 11px; border-right:1px solid var(--border); border-bottom:1px solid var(--border); }
.kpi-cell:nth-child(even) { border-right:none; }
.kpi-cell:nth-child(n+3)  { border-bottom:none; }
.kpi-lbl { font-family:var(--mono); font-size:.52rem; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); margin-bottom:3px; }
.kpi-num { font-family:var(--mono); font-size:.82rem; font-weight:500; color:var(--text); }
.kpi-num.up-c { color:var(--up); }
.kpi-num.dn-c { color:var(--dn); }

.sec-hdr { padding:7px 11px 6px; font-family:var(--mono); font-size:.54rem; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); border-bottom:1px solid var(--border); flex-shrink:0; display:flex; align-items:center; justify-content:space-between; }
.sec-hdr-clr { background:transparent; border:none; color:var(--dim); font-family:var(--mono); font-size:.56rem; cursor:pointer; padding:0; transition:color .1s; }
.sec-hdr-clr:hover { color:var(--dn); }

#h-scroll { flex:1; overflow-y:auto; }

.hrow { display:flex; align-items:center; gap:7px; padding:7px 11px; border-bottom:1px solid rgba(124,77,255,.05); cursor:pointer; transition:background .1s; }
.hrow:hover { background:rgba(124,77,255,.08); }
.hrow.sel   { background:rgba(124,77,255,.15); border-left:2px solid var(--purple); padding-left:9px; }
.htick { font-family:var(--mono); font-size:.7rem; font-weight:500; width:48px; flex-shrink:0; }
.hname { font-size:.62rem; color:var(--muted); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.hpnl  { font-family:var(--mono); font-size:.65rem; font-weight:500; text-align:right; flex-shrink:0; }
.hpnl.up-c { color:var(--up); }
.hpnl.dn-c { color:var(--dn); }
.hrem { background:transparent; border:none; color:transparent; cursor:pointer; font-size:.8rem; padding:0 2px; transition:color .1s; flex-shrink:0; line-height:1; }
.hrow:hover .hrem { color:var(--dim); }
.hrem:hover { color:var(--dn) !important; }

.no-items { padding:14px 11px; font-size:.63rem; color:var(--dim); font-family:var(--mono); }

/* ── overlays ── */
.ov { position:absolute; inset:0; z-index:20; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px; background:var(--bg); transition:opacity .25s; }
.ov.hide { opacity:0; pointer-events:none; }
.spin { width:22px; height:22px; border:2px solid rgba(124,77,255,.18); border-top-color:var(--purple); border-radius:50%; animation:sp .65s linear infinite; }
@keyframes sp { to { transform:rotate(360deg); } }
.ov-msg { font-family:var(--mono); font-size:.68rem; color:var(--muted); text-align:center; max-width:300px; line-height:1.6; }
.ov-btn { background:rgba(124,77,255,.14); border:1px solid var(--border2); border-radius:6px; color:var(--phi); font-family:var(--sans); font-size:.7rem; padding:5px 14px; cursor:pointer; margin-top:4px; }
.ov-btn:hover { background:rgba(124,77,255,.24); }
</style>
</head>
<body>

<div id="hdr">
  <span class="logo">SPECTRE</span>
  <div class="vdiv"></div>

  <!-- nav tabs — matches dashboard exactly -->
  <div class="app-nav-tabs">
    <a class="app-nav-tab" href="https://spectre-assets.com/dashboard?tab=quant">Quant</a>
    <a class="app-nav-tab" href="https://spectre-assets.com/dashboard?tab=ai">AI</a>
    <a class="app-nav-tab" href="https://spectre-assets.com/dashboard?tab=research">Research</a>
    <a class="app-nav-tab app-nav-tab-active">Analytics</a>
  </div>
  <div class="vdiv"></div>

  <!-- search -->
  <div id="search-wrap">
    <span class="search-icon">⌕</span>
    <input id="search-input" type="text" placeholder="Search ticker or company…" autocomplete="off" spellcheck="false"/>
    <div id="search-drop"></div>
  </div>

  <div class="vdiv"></div>
  <div class="pill-row" id="tf-row">
    <button class="pill"    data-tf="1d"  data-iv="5m" >1D</button>
    <button class="pill"    data-tf="5d"  data-iv="30m">1W</button>
    <button class="pill"    data-tf="1mo" data-iv="1d" >1M</button>
    <button class="pill on" data-tf="3mo" data-iv="1d" >3M</button>
    <button class="pill"    data-tf="6mo" data-iv="1d" >6M</button>
    <button class="pill"    data-tf="1y"  data-iv="1d" >1Y</button>
    <button class="pill"    data-tf="5y"  data-iv="1wk">5Y</button>
  </div>
  <div class="vdiv"></div>
  <div class="pill-row" id="ct-row">
    <button class="pill on-o" data-ct="candle">Candle</button>
    <button class="pill"      data-ct="ohlc"  >OHLC</button>
    <button class="pill"      data-ct="line"  >Line</button>
    <button class="pill"      data-ct="area"  >Area</button>
  </div>

  <div id="price-strip">
    <span id="p-sym"></span>
    <span id="p-last">—</span>
    <span id="p-chg"></span>
    <button id="add-btn" title="Add to watchlist">＋ Watchlist</button>
  </div>
</div>

<div id="layout">
  <div id="chart-col">
    <div id="main-wrap">
      <div id="main-chart"></div>
      <div class="ov" id="ov-load"><div class="spin"></div><div class="ov-msg">Loading chart data…</div></div>
      <div class="ov hide" id="ov-err">
        <div class="ov-msg" id="ov-err-msg">No data</div>
        <button class="ov-btn" onclick="_retry()">Try again</button>
      </div>
    </div>
    <div id="vol-wrap"><div id="vol-chart"></div></div>
  </div>

  <div id="sidebar">
    <div id="kpis">
      <div class="kpi-cell"><div class="kpi-lbl">Portfolio</div><div class="kpi-num" id="k-val">—</div></div>
      <div class="kpi-cell"><div class="kpi-lbl">P&amp;L $</div><div class="kpi-num" id="k-pnl">—</div></div>
      <div class="kpi-cell"><div class="kpi-lbl">P&amp;L %</div><div class="kpi-num" id="k-pct">—</div></div>
      <div class="kpi-cell"><div class="kpi-lbl">Positions</div><div class="kpi-num" id="k-cnt">—</div></div>
    </div>
    <div id="h-scroll">
      <div class="sec-hdr">Portfolio</div>
      <div id="port-list"></div>
      <div class="sec-hdr">
        Watchlist
        <button class="sec-hdr-clr" id="clr-wl" title="Clear watchlist">clear</button>
      </div>
      <div id="watch-list"></div>
    </div>
  </div>
</div>

<script>
(async () => {
  if (/mac/i.test(navigator.platform)) document.documentElement.classList.add('mac');

  /* ── theme ── */
  const theme = await (window.electronAPI?.getTheme?.() || Promise.resolve('dark')).catch(() => 'dark');
  if (theme === 'light') document.documentElement.classList.add('light');

  const CT = theme === 'light' ? {
    bg: '#ddd6f3', text: '#9890b8',
    grid: 'rgba(124,77,255,.10)', gridVol: 'rgba(124,77,255,.07)',
    crosshairLine: 'rgba(124,77,255,.55)', crosshairLabel: '#c4badf',
    border: 'rgba(124,77,255,.22)',
  } : {
    bg: '#07050f', text: '#6b6490',
    grid: 'rgba(124,77,255,.06)', gridVol: 'rgba(124,77,255,.04)',
    crosshairLine: 'rgba(168,85,247,.6)', crosshairLabel: '#1a0e38',
    border: 'rgba(124,77,255,.14)',
  };

  const PROD = 'https://spectre-assets.com';
  const WL_KEY = 'spectre-watchlist-v1';

  let holdings = [], watchlist = [];
  let mainChart = null, mainSeries = null, volChart = null, volSeries = null;
  let curTicker = null, curSource = null, curName = null;
  let curTf = '3mo', curIv = '1d', curCt = 'candle', cachedCandles = [];

  /* ── auth ── */
  try {
    const s = await fetch('/api/auth/session').then(r => r.json());
    if (!s?.user && !s?.userId && !s?.id && !s?.authenticated) { location.href = PROD+'/signin'; return; }
  } catch {}

  /* ── portfolio ── */
  try {
    const d = await fetch('/api/portfolio').then(r => r.json());
    holdings = (d.holdings || d || []).filter(h => h?.ticker);
  } catch {}

  /* ── watchlist from localStorage ── */
  try { watchlist = JSON.parse(localStorage.getItem(WL_KEY) || '[]'); } catch { watchlist = []; }

  renderPortfolio(); renderWatchlist(); renderKPIs(); initCharts();
  if (holdings.length) loadChart(holdings[0].ticker, holdings[0].source, holdings[0].name);

  /* ── charts ── */
  function initCharts() {
    const base = {
      autoSize: true,
      layout: { background:{ color: CT.bg }, textColor: CT.text, fontFamily:"'DM Mono',monospace", fontSize:11 },
      grid: { vertLines:{ color: CT.grid }, horzLines:{ color: CT.grid } },
      crosshair: {
        mode: LightweightCharts.CrosshairMode.Normal,
        vertLine:{ color: CT.crosshairLine, labelBackgroundColor: CT.crosshairLabel },
        horzLine:{ color: CT.crosshairLine, labelBackgroundColor: CT.crosshairLabel },
      },
      rightPriceScale:{ borderColor: CT.border },
      timeScale:{ borderColor: CT.border, timeVisible:true, secondsVisible:false },
      handleScroll:true, handleScale:true,
    };
    mainChart = LightweightCharts.createChart(document.getElementById('main-chart'), base);
    volChart  = LightweightCharts.createChart(document.getElementById('vol-chart'), {
      ...base,
      grid:{ vertLines:{ color:'transparent' }, horzLines:{ color: CT.gridVol } },
      crosshair:{ horzLine:{ visible:false }, vertLine:{ visible:false } },
      rightPriceScale:{ borderColor: CT.border, scaleMargins:{ top:0.05, bottom:0 }, drawTicks:false },
      timeScale:{ visible:false }, handleScroll:false, handleScale:false,
    });
    volSeries = volChart.addHistogramSeries({ priceFormat:{ type:'volume' }, lastValueVisible:false, priceLineVisible:false });
    mainChart.timeScale().subscribeVisibleLogicalRangeChange(r => { if (r!==null) volChart.timeScale().setVisibleLogicalRange(r); });
  }

  function makeSeries(ct) {
    const up='#22c55e', dn='#ef4444';
    if (ct==='candle') return mainChart.addCandlestickSeries({ upColor:up,downColor:dn,borderUpColor:up,borderDownColor:dn,wickUpColor:up,wickDownColor:dn });
    if (ct==='ohlc')   return mainChart.addBarSeries({ upColor:up, downColor:dn });
    if (ct==='line')   return mainChart.addLineSeries({ color:'#7c4dff', lineWidth:2, priceLineVisible:false });
    if (ct==='area')   return mainChart.addAreaSeries({ lineColor:'#7c4dff', lineWidth:2, topColor:'rgba(124,77,255,.35)', bottomColor:'rgba(124,77,255,.02)', priceLineVisible:false });
  }

  function feed(s, ct, candles) {
    s.setData((ct==='line'||ct==='area') ? candles.map(c=>({time:c.time,value:c.close})) : candles);
  }

  /* ── load chart data ── */
  async function loadChart(ticker, source, name) {
    curTicker = ticker; curSource = source || ''; curName = name || ticker;
    showLoad(true); hideErr();
    if (mainSeries) { try { mainChart.removeSeries(mainSeries); } catch {} mainSeries = null; }
    updateAddBtn();

    const sym = toYF(ticker, source);
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=${curIv}&range=${curTf}&includePrePost=false&corsDomain=finance.yahoo.com`;

    try {
      const res  = await fetch(url);
      if (!res.ok) throw new Error('HTTP '+res.status);
      const json = await res.json();
      const r    = json?.chart?.result?.[0];
      if (!r) throw new Error('no result');
      const ts=r.timestamp, q=r.indicators?.quote?.[0];
      if (!ts?.length||!q) throw new Error('no quotes');

      const candles=[], vols=[];
      for (let i=0; i<ts.length; i++) {
        if (q.open[i]==null||q.close[i]==null||q.high[i]==null||q.low[i]==null) continue;
        const c={ time:ts[i], open:+q.open[i].toFixed(4), high:+q.high[i].toFixed(4), low:+q.low[i].toFixed(4), close:+q.close[i].toFixed(4) };
        candles.push(c);
        vols.push({ time:ts[i], value:q.volume[i]||0, color:c.close>=c.open?'rgba(34,197,94,.35)':'rgba(239,68,68,.3)' });
      }
      if (!candles.length) throw new Error('empty candles');

      cachedCandles = candles;
      mainSeries = makeSeries(curCt);
      feed(mainSeries, curCt, candles);
      volSeries.setData(vols);
      mainChart.timeScale().fitContent();

      const last=candles[candles.length-1].close, first=candles[0].open;
      const chg=last-first, pct=chg/first*100;
      document.getElementById('p-sym').textContent  = sym;
      document.getElementById('p-last').textContent = '$'+last.toFixed(2);
      const pEl=document.getElementById('p-chg');
      pEl.textContent = (chg>=0?'+':'')+chg.toFixed(2)+' ('+(pct>=0?'+':'')+pct.toFixed(2)+'%)';
      pEl.className   = chg>=0?'up-c':'dn-c';
      showLoad(false);
    } catch(e) {
      showLoad(false);
      showErr('No data for '+sym+(e.message?'\n'+e.message:''));
    }
  }

  /* ── ticker mapping ── */
  function toYF(ticker, source) {
    const s=(source||'').toUpperCase();
    if (s.includes('ASX'))                         return ticker+'.AX';
    if (s.includes('CRYPTO'))                      return ticker+'-USD';
    if (s.includes('GOLD')||s.includes('BULLION')) return 'GC=F';
    return ticker;
  }

  /* ── search ── */
  const searchInput = document.getElementById('search-input');
  const searchDrop  = document.getElementById('search-drop');
  let searchTimer = null, dropFocusIdx = -1;

  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    const q = searchInput.value.trim();
    if (!q) { closeDropdown(); return; }
    searchTimer = setTimeout(() => doSearch(q), 280);
  });

  searchInput.addEventListener('keydown', e => {
    const items = searchDrop.querySelectorAll('.drop-item');
    if (e.key==='ArrowDown') { e.preventDefault(); moveFocus(items, 1); }
    else if (e.key==='ArrowUp') { e.preventDefault(); moveFocus(items, -1); }
    else if (e.key==='Enter') { e.preventDefault(); items[dropFocusIdx]?.click(); }
    else if (e.key==='Escape') { closeDropdown(); searchInput.blur(); }
  });

  document.addEventListener('click', e => { if (!document.getElementById('search-wrap').contains(e.target)) closeDropdown(); });

  function moveFocus(items, dir) {
    if (!items.length) return;
    items[dropFocusIdx]?.classList.remove('focused');
    dropFocusIdx = Math.max(0, Math.min(items.length-1, dropFocusIdx+dir));
    items[dropFocusIdx]?.classList.add('focused');
    items[dropFocusIdx]?.scrollIntoView({ block:'nearest' });
  }

  async function doSearch(q) {
    dropFocusIdx = -1;
    const url = `https://query1.finance.yahoo.com/v1/finance/search?q=${encodeURIComponent(q)}&quotesCount=10&newsCount=0&listsCount=0&enableCb=false&enableNavLinks=false`;
    try {
      const res  = await fetch(url);
      const data = await res.json();
      const quotes = (data?.quotes || []).filter(x => x.symbol && x.quoteType !== 'CURRENCY');
      renderDropdown(q, quotes);
    } catch { renderDropdown(q, []); }
  }

  function renderDropdown(q, quotes) {
    if (!quotes.length && !q) { closeDropdown(); return; }

    // partition: portfolio matches first, then rest
    const portSet = new Set(holdings.map(h => toYF(h.ticker, h.source)));
    const portHits = quotes.filter(x => portSet.has(x.symbol) || holdings.some(h => h.ticker===x.symbol));
    const marketHits = quotes.filter(x => !portHits.includes(x));

    let html = '';

    if (portHits.length) {
      html += `<div class="drop-section">Portfolio</div>`;
      html += portHits.map(x => dropItem(x, true)).join('');
    }
    if (marketHits.length) {
      html += `<div class="drop-section">Market</div>`;
      html += marketHits.map(x => dropItem(x, false)).join('');
    }
    if (!html) {
      html = `<div style="padding:14px 12px;font-size:.65rem;color:var(--muted);font-family:var(--mono)">No results for "${q}"</div>`;
    }

    searchDrop.innerHTML = html;
    searchDrop.classList.add('open');

    searchDrop.querySelectorAll('.drop-item').forEach(item => {
      item.addEventListener('click', () => {
        const sym  = item.dataset.sym;
        const name = item.dataset.name;
        const exch = item.dataset.exch || '';
        // figure out source from exchange for mapping
        const src  = exch.includes('ASX') ? 'ASX' : exch.includes('Crypto') || exch.includes('CCC') ? 'CRYPTO' : '';
        selectSidebar(sym, src, name);
        searchInput.value = '';
        closeDropdown();
      });
    });
  }

  function dropItem(x, inPort) {
    const sym  = (x.symbol||'').replace(/&/g,'&amp;');
    const name = (x.shortname||x.longname||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;');
    const exch = (x.exchDisp||x.exchange||'').replace(/&/g,'&amp;');
    return `<div class="drop-item" data-sym="${sym}" data-name="${name}" data-exch="${exch}">
      <span class="drop-sym">${sym}</span>
      <span class="drop-name">${name}</span>
      <span class="drop-exch">${exch}</span>
      ${inPort ? '<span class="drop-port">held</span>' : ''}
    </div>`;
  }

  function closeDropdown() { searchDrop.classList.remove('open'); dropFocusIdx=-1; }

  /* select a stock from any source (sidebar, dropdown, etc.) */
  function selectSidebar(ticker, source, name) {
    curTicker = ticker; curSource = source; curName = name;
    // highlight in portfolio list
    document.querySelectorAll('.hrow').forEach(r => r.classList.toggle('sel', r.dataset.tick===ticker));
    loadChart(ticker, source, name);
    updateAddBtn();
  }

  /* ── watchlist ── */
  function saveWL() { try { localStorage.setItem(WL_KEY, JSON.stringify(watchlist)); } catch {} }

  function addToWatchlist(ticker, source, name) {
    if (watchlist.find(w => w.ticker===ticker)) return;
    watchlist.push({ ticker, source:source||'', name:name||ticker });
    saveWL(); renderWatchlist(); updateAddBtn();
  }

  function removeFromWatchlist(ticker) {
    watchlist = watchlist.filter(w => w.ticker!==ticker);
    saveWL(); renderWatchlist(); updateAddBtn();
  }

  function inPortfolio(ticker) { return holdings.some(h => h.ticker===ticker); }
  function inWatchlist(ticker) { return !!watchlist.find(w => w.ticker===ticker); }

  function updateAddBtn() {
    const btn = document.getElementById('add-btn');
    if (!curTicker || inPortfolio(curTicker)) { btn.style.display='none'; return; }
    btn.style.display='';
    if (inWatchlist(curTicker)) {
      btn.textContent='✓ Watchlist'; btn.classList.add('in-wl');
    } else {
      btn.textContent='＋ Watchlist'; btn.classList.remove('in-wl');
    }
  }

  document.getElementById('add-btn').addEventListener('click', () => {
    if (!curTicker || inPortfolio(curTicker)) return;
    if (inWatchlist(curTicker)) removeFromWatchlist(curTicker);
    else addToWatchlist(curTicker, curSource, curName);
  });

  document.getElementById('clr-wl').addEventListener('click', () => {
    if (!watchlist.length) return;
    if (confirm('Clear entire watchlist?')) { watchlist=[]; saveWL(); renderWatchlist(); updateAddBtn(); }
  });

  /* ── sidebar render ── */
  function renderPortfolio() {
    const el = document.getElementById('port-list');
    if (!holdings.length) { el.innerHTML='<div class="no-items">No holdings found</div>'; return; }
    el.innerHTML = holdings.map((h,i) => {
      const pnl=(h.value||0)-(h.costBase||0), pct=h.costBase?pnl/h.costBase*100:0;
      return `<div class="hrow${i===0?' sel':''}" data-tick="${h.ticker}" data-i="${i}">
        <span class="htick">${h.ticker}</span>
        <span class="hname">${h.name||''}</span>
        <span class="hpnl ${pnl>=0?'up-c':'dn-c'}">${pnl>=0?'+':''}${pct.toFixed(1)}%</span>
      </div>`;
    }).join('');
    el.querySelectorAll('.hrow').forEach(row => row.addEventListener('click', () => {
      const i=+row.dataset.i, h=holdings[i];
      document.querySelectorAll('.hrow').forEach(r=>r.classList.toggle('sel', r===row));
      selectSidebar(h.ticker, h.source, h.name);
    }));
  }

  function renderWatchlist() {
    const el = document.getElementById('watch-list');
    if (!watchlist.length) { el.innerHTML='<div class="no-items">Search for a stock and add it here</div>'; return; }
    el.innerHTML = watchlist.map(w => `
      <div class="hrow" data-tick="${w.ticker}">
        <span class="htick">${w.ticker}</span>
        <span class="hname">${w.name||''}</span>
        <button class="hrem" title="Remove" data-tick="${w.ticker}">×</button>
      </div>`).join('');
    el.querySelectorAll('.hrow').forEach(row => row.addEventListener('click', e => {
      if (e.target.classList.contains('hrem')) return;
      const tick=row.dataset.tick, w=watchlist.find(x=>x.ticker===tick);
      document.querySelectorAll('.hrow').forEach(r=>r.classList.toggle('sel', r===row));
      if (w) selectSidebar(w.ticker, w.source, w.name);
    }));
    el.querySelectorAll('.hrem').forEach(btn => btn.addEventListener('click', e => {
      e.stopPropagation(); removeFromWatchlist(btn.dataset.tick);
    }));
  }

  function renderKPIs() {
    const total=holdings.reduce((s,h)=>s+(h.value||0),0), cost=holdings.reduce((s,h)=>s+(h.costBase||0),0);
    const pnl=total-cost, pct=cost?pnl/cost*100:0;
    const $=v=>'$'+Math.abs(v).toLocaleString('en-AU',{maximumFractionDigits:0});
    const set=(id,txt,cls)=>{const e=document.getElementById(id);e.textContent=txt;e.className='kpi-num'+(cls?' '+cls:'');};
    set('k-val',$(total),''); set('k-pnl',(pnl>=0?'+':'-')+$(pnl),pnl>=0?'up-c':'dn-c');
    set('k-pct',(pct>=0?'+':'')+pct.toFixed(2)+'%',pct>=0?'up-c':'dn-c'); set('k-cnt',holdings.length+'','');
  }

  /* ── overlays ── */
  function showLoad(on) { document.getElementById('ov-load').classList.toggle('hide',!on); }
  function showErr(msg) { document.getElementById('ov-err-msg').textContent=msg; document.getElementById('ov-err').classList.remove('hide'); }
  function hideErr()    { document.getElementById('ov-err').classList.add('hide'); }
  window._retry = () => { if (curTicker) loadChart(curTicker, curSource, curName); };

  /* ── timeframe ── */
  document.getElementById('tf-row').addEventListener('click', e => {
    const b=e.target.closest('.pill'); if (!b) return;
    document.querySelectorAll('#tf-row .pill').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); curTf=b.dataset.tf; curIv=b.dataset.iv;
    if (curTicker) loadChart(curTicker, curSource, curName);
  });

  /* ── chart type ── */
  document.getElementById('ct-row').addEventListener('click', e => {
    const b=e.target.closest('.pill'); if (!b) return;
    document.querySelectorAll('#ct-row .pill').forEach(x=>x.classList.remove('on-o'));
    b.classList.add('on-o'); curCt=b.dataset.ct;
    if (mainSeries && cachedCandles.length) {
      try { mainChart.removeSeries(mainSeries); } catch {}
      mainSeries=makeSeries(curCt); feed(mainSeries,curCt,cachedCandles); mainChart.timeScale().fitContent();
    }
  });
})();
</script>
</body>
</html>
